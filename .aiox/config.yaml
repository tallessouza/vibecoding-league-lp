      - "@radix-ui/react-slot"
      - "@radix-ui/react-dialog"
      - "@radix-ui/react-dropdown-menu"
  deployment:
    platform: vercel
    branch: main

paths:
  stories: docs/stories
  prd: docs/prd
  architecture: docs/architecture.md
